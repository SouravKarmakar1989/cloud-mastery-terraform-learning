name: gcp-terraform-apply

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Infrastructure module to deploy'
        required: true
        type: choice
        options:
          - gcp-minimal
      environment:
        description: 'Target environment (dev, staging, prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      target_resource:
        description: 'Terraform resource to target. Leave empty to apply all.'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      TF_TARGET: ${{ inputs.target_resource != '' && format('-target={0}', inputs.target_resource) || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate GCP OIDC variables
        run: |
          if [ -z "${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ] || [ -z "${{ vars.GCP_SERVICE_ACCOUNT }}" ]; then
            echo "::error::Missing required repository variables GCP_WORKLOAD_IDENTITY_PROVIDER and/or GCP_SERVICE_ACCOUNT. See .github/GCP_OIDC_SETUP.md"
            exit 1
          fi

      - name: GCP Auth (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: platforms/github-iac-terraform/gcp-infrastructure/${{ inputs.module }}
        run: terraform init -backend-config=env/${{ inputs.environment }}/backend.hcl

      - name: Terraform Plan
        working-directory: platforms/github-iac-terraform/gcp-infrastructure/${{ inputs.module }}
        run: terraform plan -var-file=env/${{ inputs.environment }}/terraform.tfvars ${{ env.TF_TARGET }}

      - name: Terraform Apply
        working-directory: platforms/github-iac-terraform/gcp-infrastructure/${{ inputs.module }}
        run: terraform apply -auto-approve -var-file=env/${{ inputs.environment }}/terraform.tfvars ${{ env.TF_TARGET }}
