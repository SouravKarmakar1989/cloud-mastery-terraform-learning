name: ci

# ── Triggers ───────────────────────────────────────────────────────────────────
# Runs on every PR targeting main, and on direct pushes to main.
# This is the primary quality and security gate — must pass before merge.

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  id-token: write       # OIDC token for Azure login
  contents: read        # checkout
  security-events: write # upload SARIF results to GitHub Security tab
  pull-requests: write  # post inline comments on PR

# Cancel in-progress runs on the same PR/branch to save minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Job 1: Secret Scanning ────────────────────────────────────────────────
  # Gitleaks scans the entire git history for leaked credentials.
  # Never rely on "I didn't push it" — history scanning catches old commits too.
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for Gitleaks

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 2: Terraform Format & Validate ───────────────────────────────────
  # Fast feedback: are all .tf files properly formatted and syntactically valid?
  tf-lint:
    name: Terraform Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: hashicorp/setup-terraform@v3

      - name: Detect changed Terraform modules
        id: changed-tf
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only HEAD~1...HEAD)
          else
            CHANGED_FILES=$(git show --name-only --pretty='' HEAD)
          fi

          printf "%s\n" "$CHANGED_FILES" | grep -E '^platforms/github-iac-terraform/.*\.(tf|tfvars)$' > changed_tf_paths.txt || true

          : > changed_tf_modules.txt
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            dir=$(dirname "$path")
            while [ "$dir" != "." ] && [ "$dir" != "/" ]; do
              if [ -f "$dir/versions.tf" ]; then
                echo "$dir" >> changed_tf_modules.txt
                break
              fi
              parent=$(dirname "$dir")
              [ "$parent" = "$dir" ] && break
              dir="$parent"
            done
          done < changed_tf_paths.txt

          sort -u changed_tf_modules.txt -o changed_tf_modules.txt || true

          if [ -s changed_tf_modules.txt ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed Terraform modules:"
            cat changed_tf_modules.txt
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changed Terraform modules detected."
          fi

      - name: Check terraform fmt (changed modules)
        if: steps.changed-tf.outputs.has_changes == 'true'
        run: |
          FAILED=0
          while IFS= read -r mod_dir; do
            [ -z "$mod_dir" ] && continue
            echo "→ Checking fmt: $mod_dir"
            if ! terraform -chdir="$mod_dir" fmt -check -recursive; then
              echo "::error::terraform fmt failed in $mod_dir — run 'terraform fmt -recursive' to fix"
              FAILED=1
            fi
          done < changed_tf_modules.txt
          exit $FAILED

      - name: Terraform validate (changed modules)
        if: steps.changed-tf.outputs.has_changes == 'true'
        run: |
          FAILED=0
          while IFS= read -r mod_dir; do
            [ -z "$mod_dir" ] && continue
            echo "→ Validating: $mod_dir"
            terraform -chdir="$mod_dir" init -backend=false -input=false -no-color > /dev/null 2>&1
            if ! terraform -chdir="$mod_dir" validate -no-color; then
              echo "::error::terraform validate failed in $mod_dir"
              FAILED=1
            fi
          done < changed_tf_modules.txt
          exit $FAILED

      - name: tflint (Azure)
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - run: |
          tflint --init
          grep '^platforms/github-iac-terraform/azure-infrastructure/' changed_tf_modules.txt > changed_azure_modules.txt || true
          while read dir; do
              [ -z "$dir" ] && continue
              echo "→ tflint: $dir"
              tflint --chdir="$dir" --no-color || true
            done < changed_azure_modules.txt

  # ── Job 3: IaC Security Scan (Checkov) ───────────────────────────────────
  # Checkov checks Terraform for misconfigurations:
  # public storage, missing encryption, no soft-delete, missing tags, etc.
  iac-scan:
    name: IaC Scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Checkov — changed Terraform files
        shell: bash
        run: |
          set -euo pipefail

          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only HEAD~1...HEAD)
          else
            CHANGED_FILES=$(git show --name-only --pretty='' HEAD)
          fi

          printf "%s\n" "$CHANGED_FILES" | grep -E '^platforms/github-iac-terraform/.*\.tf$' > changed_tf_files.txt || true
          if [ ! -s changed_tf_files.txt ]; then
            echo "No changed Terraform files to scan."
            exit 0
          fi

          python3 -m pip install --user --quiet checkov
          export PATH="$HOME/.local/bin:$PATH"

          FAILED=0
          while IFS= read -r tf_file; do
            [ -z "$tf_file" ] && continue
            echo "→ Checkov: $tf_file"
            if ! checkov -f "$tf_file" --framework terraform --config-file .checkov.yaml --quiet; then
              FAILED=1
            fi
          done < changed_tf_files.txt

          exit $FAILED

      - name: Upload SARIF to GitHub Security tab
        if: always() && hashFiles('results-azure.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results-azure.sarif

  # ── Job 4: SAST — Semgrep ────────────────────────────────────────────────
  # Semgrep scans for secrets, misconfigurations, and bad patterns in
  # any language present in the repo. Free tier covers all standard rules.
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: >
          if [ -n "${SEMGREP_APP_TOKEN:-}" ]; then
            semgrep ci --config auto --sarif --output semgrep.sarif;
          else
            semgrep scan --config auto --sarif --output semgrep.sarif;
          fi
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}  # optional: link to semgrep.dev dashboard

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  # ── Job 5: Dependency / SCA Scan ─────────────────────────────────────────
  # Scans provider version constraints for known CVEs.
  # Dependabot handles this automatically if enabled — this is an extra gate.
  sca:
    name: SCA — Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy repo scan (misconfig + secrets)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

  # ── Summary Gate ─────────────────────────────────────────────────────────
  # This job is the single required status check in branch protection rules.
  # Add ONLY this job to "Required status checks" in GitHub Settings.
  # It passes only when all scan jobs pass.
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [secret-scan, tf-lint, iac-scan, sast, sca]
    if: always()
    steps:
      - name: Evaluate all jobs
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results" | python3 -c "
          import sys, json
          needs = json.load(sys.stdin)
          failed = [k for k, v in needs.items() if v['result'] not in ('success', 'skipped')]
          if failed:
              print('FAILED jobs:', failed)
              sys.exit(1)
          print('All CI checks passed.')
          "
